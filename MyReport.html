    <script>
        const reportsContainer = document.getElementById('reportsContainer');
        const reports = JSON.parse(localStorage.getItem('reports')) || [];

        if (reports.length === 0) {
            reportsContainer.innerHTML = "<p>No reports found.</p>";
        } else {
            reports.forEach(report => {
                const card = document.createElement('div');
                card.className = 'reportcard';

                card.innerHTML = `
                    <div class="report-header">
                        <h3>${report.issue}</h3>
                        <h4>District: ${report.district}</h4>
                        <h4>Date: ${report.date}</h4>
                    </div>
                    <button onclick="markResolved(this)">Mark as Resolved</button>
                `;

                reportsContainer.appendChild(card);
            });
        }

        function markResolved(button) {
            button.disabled = true;
            button.textContent = "Resolved";
            button.parentElement.style.opacity = "0.6";
        }
    </script>
