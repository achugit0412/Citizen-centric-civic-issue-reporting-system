        <div class="login-container">
            <div class="form">
        <h2> Authority Login</h2>
        <form id="authorityForm">
  <input type="text" id="name" placeholder="Name" required>
  <input type="password" id="password" placeholder="Password" required>
  <input type="text" id="designation" placeholder="Designation" required>

  <select id="district" required style="
  padding: 8px 14px;
  font-size: 15px;
  width: 200px; 
  margin-top: 30px;
">
    <option value="">Select District</option>
    <option value="chennai">Chennai</option>
    <option value="erode">Erode</option>
    <option value="coimbatore">Coimbatore</option>
  </select>
  <br>
  <button type="submit" class="Login" >Login</button>
</form>

<script>
document.getElementById("authorityForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const district = document.getElementById("district").value;
  localStorage.setItem("authorityDistrict", district);

  window.location.href = "authorityFeed.html";
});
</script>
        


    
</body>
